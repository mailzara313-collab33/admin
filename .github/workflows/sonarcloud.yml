name: SonarCloud analysis

# Kurulum:
# 1. https://sonarcloud.io - GitHub hesabinizla giris yapin
# 2. Bu repoyu import edin
# 3. Settings > Secrets > Actions > SONAR_TOKEN ekleyin

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if token missing
        id: check
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN not set - skipping analysis"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Analyze with SonarCloud
        if: steps.check.outputs.skip == 'false'
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mailzara313-collab33_admin
            -Dsonar.organization=mailzara313-collab33
            -Dsonar.sources=application
            -Dsonar.exclusions=application/logs/**,uploads/**,assets/**
          projectBaseDir: .
