name: SonarCloud analysis

# SonarCloud kurulumu icin:
# 1. https://sonarcloud.io adresine GitHub hesabinizla giris yapin
# 2. "Import your project" ile bu repoyu ekleyin
# 3. Project Key ve Organization Key'i asagiya yazdirin
# 4. SonarCloud > My Account > Security > Generate Token
# 5. GitHub > Settings > Secrets > Actions > SONAR_TOKEN ekleyin

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud icin tam git gecmisi gerekli

      - name: Check SonarCloud secrets
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "WARNING: SONAR_TOKEN secret is not set."
            echo "Please follow setup instructions in this workflow file."
            echo "Skipping SonarCloud analysis."
            exit 0
          fi

      - name: Analyze with SonarCloud
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mailzara313-collab33_admin
            -Dsonar.organization=mailzara313-collab33
            -Dsonar.sources=application
            -Dsonar.exclusions=application/logs/**,uploads/**,assets/**
          projectBaseDir: .
