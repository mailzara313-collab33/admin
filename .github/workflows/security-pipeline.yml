name: Admin Security Pipeline

on:
  push:
    branches: [master, staging, develop]
  pull_request:
    branches: [master, develop]

jobs:
  # ============================================================
  # STAGE 1 — Secret Scanning (blocks everything if secrets found)
  # ============================================================
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ============================================================
  # STAGE 2 — SAST (runs in parallel with SCA)
  # ============================================================
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/php
            p/owasp-top-ten
            p/sql-injection
            p/xss
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ============================================================
  # STAGE 2 — Dependency Audit / SCA (parallel with SAST)
  # ============================================================
  sca:
    name: Dependency Audit (Composer)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Composer Audit
        run: composer audit --format=json | tee sca-report.json
        # Fail if HIGH or CRITICAL vulnerabilities found
        continue-on-error: false

      - name: Upload SCA Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-report
          path: sca-report.json

  # ============================================================
  # STAGE 3 — Tests (requires SAST + SCA to pass)
  # ============================================================
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: [sast, sca]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_pass
          MYSQL_DATABASE: eshop_test
          MYSQL_USER: eshop_user
          MYSQL_PASSWORD: eshop_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    env:
      DB_HOST: 127.0.0.1
      DB_USER: eshop_user
      DB_PASS: eshop_pass
      DB_NAME: eshop_test
      JWT_SECRET_KEY: test_jwt_secret_for_ci_only
      ION_AUTH_SESSION_HASH: test_session_hash_for_ci_only
      CI_ENV: testing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, mbstring, json
          tools: composer, phpunit

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: |
          if [ -f phpunit.xml ] || [ -f phpunit.xml.dist ]; then
            ./vendor/bin/phpunit --coverage-clover=coverage.xml
          else
            echo "No PHPUnit config found — skipping (add tests!)" && exit 0
          fi

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ============================================================
  # STAGE 4 — DAST (staging branch only, after tests pass)
  # ============================================================
  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ secrets.STAGING_URL }}
          rules_file_name: .zap/rules.tsv
          cmd_options: '-a'
          fail_action: true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
